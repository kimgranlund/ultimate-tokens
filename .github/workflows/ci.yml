name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22   # the browser smoke uses node's global WebSocket (stable in 22)
      # npm ci, not install: the committed lockfile IS the toolchain that produces the committed
      # generated artifacts — reproducibility of that chain is the point (TKT-0011).
      - run: npm ci
      - run: npm run build
      - run: npm test
      # GENERATED-ARTIFACT DRIFT GATE (TKT-0011): build+test regenerate the committed artifacts
      # (figma/plugin/ui.html, src/ui/*-assets.js, src/ui/categories/*, docs/img) in this runner —
      # if the regenerated bytes differ from what was COMMITTED, the contributor skipped the gen
      # scripts and every real consumer (Figma plugin, npm channel, zip) would ship stale output on
      # a green build. Fail loudly instead.
      - name: Generated artifacts match committed
        run: |
          git diff --stat --exit-code || { echo "::error::Committed generated artifacts are stale — run npm test locally and commit the regenerated files."; exit 1; }
      # real-browser smoke: boot the built single-file in the runner's headless Chrome (CDP, no extra
      # deps) and drive gallery → category → editor → export dialog. Catches UI regressions the DOM shim can't.
      - run: npm run smoke
      - name: Upload smoke screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-screenshots
          path: smoke-out/
          if-no-files-found: ignore
