name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22   # the browser smoke uses node's global WebSocket (stable in 22)
      - run: npm install
      - run: npm run build
      - run: npm test
      # real-browser smoke: boot the built single-file in the runner's headless Chrome (CDP, no extra
      # deps) and drive gallery → category → editor → export dialog. Catches UI regressions the DOM shim can't.
      - run: npm run smoke
      - name: Upload smoke screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-screenshots
          path: smoke-out/
          if-no-files-found: ignore
